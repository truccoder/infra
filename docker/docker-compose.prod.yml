services:
  # ─── Reverse Proxy ───
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - web-ui
    restart: always
    networks:
      - app-network

  # ─── Application Services ───
  backend:
    image: ghcr.io/truccoder/backend:latest
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      AXIOM_TOKEN: ${AXIOM_TOKEN}
      AXIOM_DATASET: ${AXIOM_DATASET}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/socialapp
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_NEO4J_URI: bolt://neo4j:7687
      SPRING_NEO4J_AUTHENTICATION_USERNAME: neo4j
      SPRING_NEO4J_AUTHENTICATION_PASSWORD: neo4j_password
      OPENSEARCH_HOST: opensearch
      OPENSEARCH_PORT: 9200
      OPENSEARCH_SCHEME: http
      MINIO_URL: http://minio:9000
      MINIO_ACCESS_KEY: minio_admin
      MINIO_SECRET_KEY: minio_admin_password
    depends_on:
      - postgres
      - redis
      - neo4j
      - opensearch
      - minio
    restart: always
    networks:
      - app-network

  web-ui:
    image: ghcr.io/truccoder/web-ui:latest
    environment:
      NEXT_PUBLIC_USE_MOCK: "false"
    restart: always
    networks:
      - app-network

  # ─── Infrastructure Services ───
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: socialapp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    restart: always
    networks:
      - app-network

  neo4j:
    image: neo4j:5.20
    environment:
      NEO4J_AUTH: neo4j/neo4j_password
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 256m
      NEO4J_server_memory_pagecache_size: 128m
    volumes:
      - neo4j_data:/data
    restart: always
    networks:
      - app-network

  opensearch:
    image: opensearchproject/opensearch:2.13.0
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms256m -Xmx256m"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    restart: always
    networks:
      - app-network

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_admin_password
    volumes:
      - minio_data:/data
    restart: always
    networks:
      - app-network

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  redis_data:
  neo4j_data:
  opensearch_data:
  minio_data:

networks:
  app-network:
    driver: bridge
